<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Light Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LIGHT CONTROL PANEL</h1>
            <p id="system-status">Connecting to Firebase...</p>
        </header>

        <div class="blueprint-view">
            <div class="building-map">
                <div class="bulb" id="bulb-1">1</div>
                <div class="bulb" id="bulb-2">2</div>
                <div class="bulb" id="bulb-3">3</div>
                <div class="bulb" id="bulb-4">4</div>
                <div class="bulb" id="bulb-5">5</div>
                <div class="bulb" id="bulb-6">6</div>
                <div class="bulb" id="bulb-7">7</div>
                <div class="bulb" id="bulb-8">8</div>
            </div>
        </div>

        <div class="button-grid" id="control-panel">
            </div>

        <div class="history-section">
            <h3>Recent Activity</h3>
            <ul id="log-viewer"></ul>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
