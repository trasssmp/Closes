<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Blueprint Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>MASTER BLUEPRINT CONTROL</h1>
            <div class="system-status"><span class="pulse"></span> SYSTEM ONLINE | 8 TERMINALS</div>
        </header>

        <div class="main-layout">
            <section class="blueprint-area">
                <div class="blueprint-card">
                    <div class="grid-layer"></div>
                    
                    <div class="room living-room" onclick="toggleLight('light1')">
                        <span class="tag">LIVING AREA</span>
                        <div class="light-node" id="node-light1"></div>
                    </div>

                    <div class="center-wing">
                        <div class="room kitchen" onclick="toggleLight('light2')">
                            <span class="tag">KITCHEN</span>
                            <div class="light-node" id="node-light2"></div>
                        </div>
                        <div class="room hallway" onclick="toggleLight('light3')">
                            <span class="tag">HALLWAY</span>
                            <div class="light-node" id="node-light3"></div>
                        </div>
                    </div>

                    <div class="right-wing">
                        <div class="room bedroom-1" onclick="toggleLight('light4')">
                            <span class="tag">BED 01</span>
                            <div class="light-node" id="node-light4"></div>
                        </div>
                        <div class="room bedroom-2" onclick="toggleLight('light5')">
                            <span class="tag">BED 02</span>
                            <div class="light-node" id="node-light5"></div>
                        </div>
                        <div class="room bathroom" onclick="toggleLight('light6')">
                            <span class="tag">BATH</span>
                            <div class="light-node" id="node-light6"></div>
                        </div>
                    </div>

                    <div class="room balcony">
                        <span class="tag">BALCONY</span>
                        <div class="light-node" id="node-light7" onclick="toggleLight('light7')"></div>
                        <div class="light-node" id="node-light8" onclick="toggleLight('light8')"></div>
                    </div>
                </div>
            </section>

            <aside class="sidebar">
                <div class="control-panel">
                    <h3>DEVICE TERMINAL</h3>
                    <div id="btn-grid" class="btn-grid">
                        </div>
                </div>

                <div class="control-panel">
                    <h3>SET SCHEDULE</h3>
                    <div class="timer-box">
                        <select id="select-room"></select>
                        <input type="time" id="input-time">
                        <button class="btn-primary" onclick="setTimer()">SET</button>
                    </div>
                </div>

                <div class="control-panel history">
                    <h3>ACTIVITY LOGS</h3>
                    <ul id="log-list"></ul>
                </div>
            </aside>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
