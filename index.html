<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueprint Smart Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>BUILDING BLUEPRINT</h1>
            <p>Smart Lighting Control System</p>
        </header>

        <div class="main-layout">
            <section class="blueprint-section">
                <div class="blueprint-card">
                    <div class="grid-overlay"></div>
                    <div class="room room-1">
                        <span class="room-label">ROOM 01 (Living)</span>
                        <div class="light-node" id="node-room1"></div>
                    </div>
                    <div class="room room-2">
                        <span class="room-label">ROOM 02 (Bedroom)</span>
                        <div class="light-node" id="node-room2"></div>
                    </div>
                </div>
            </section>

            <section class="control-section">
                <div class="card">
                    <h3>CONTROLS</h3>
                    <div class="ctrl-row">
                        <span>Room 01</span>
                        <button class="btn-toggle" id="btn-room1" onclick="toggleLight('room1')">OFF</button>
                    </div>
                    <div class="ctrl-row">
                        <span>Room 02</span>
                        <button class="btn-toggle" id="btn-room2" onclick="toggleLight('room2')">OFF</button>
                    </div>
                </div>

                <div class="card">
                    <h3>SCHEDULE TIMER</h3>
                    <div class="timer-input">
                        <input type="time" id="schedule-time">
                        <select id="schedule-room">
                            <option value="room1">Room 01</option>
                            <option value="room2">Room 02</option>
                        </select>
                        <button class="btn-set" onclick="setTimer()">SET</button>
                    </div>
                </div>

                <div class="card history-card">
                    <h3>HISTORY LOG</h3>
                    <ul id="history-list"></ul>
                </div>
            </section>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
